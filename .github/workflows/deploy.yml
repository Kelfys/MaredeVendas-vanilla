# Deploy automático para GitHub Pages (branch gh-pages via peaceiris).
# Injeta ?v=<commit> em app.js e styles.css para cache bust no mobile.
# Dispara em push na main ou manualmente: gh workflow run deploy.yml
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html favicon.svg 404.html dist/
          cp -r css js dist/
          touch dist/.nojekyll
          BUILD_ID="${GITHUB_SHA::7}"
          sed -i "s|href=\"css/styles.css\"|href=\"css/styles.css?v=${BUILD_ID}\"|" dist/index.html
          sed -i "s|src=\"js/app.js\"|src=\"js/app.js?v=${BUILD_ID}\"|" dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true